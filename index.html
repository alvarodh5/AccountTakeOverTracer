<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account Takeover Tracer — SOC Dashboard</title>
<script src="./chart.umd.min.js"></script>
<style>
  :root{
    --bg:#070910;--panel:#0f141d;--panel2:#141b26;--border:#222b39;--text:#e7eef6;--muted:#8492a6;
    --crit:#ff4d5e;--high:#ff9f43;--warn:#f5c542;--ok:#2ec27e;--info:#39afea;
    --okta:#00c2ff;--github:#b186ff;--abuse:#ff6b9d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1300px 700px at 75% -15%,#121a28 0%,var(--bg) 55%);color:var(--text);
       font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 22px 70px}

  header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--crit);box-shadow:0 0 14px var(--crit);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .brand h1{font-size:18px;margin:0;letter-spacing:.2px}
  .brand .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .topright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chip{font-size:11.5px;padding:5px 11px;border:1px solid var(--border);border-radius:999px;color:var(--muted);background:var(--panel)}
  .chip.okta{color:var(--okta);border-color:#143b4a}.chip.github{color:var(--github);border-color:#2e2547}.chip.abuse{color:var(--abuse);border-color:#4a2435}
  .chip.live{color:var(--ok);border-color:#1c4a35}
  button.refresh{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
  button.refresh:hover{border-color:var(--info)}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
  .hero{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-bottom:8px}
  @media(max-width:820px){.hero{grid-template-columns:1fr}}
  .gaugecard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
  .gauge{width:172px;height:172px;border-radius:50%;display:grid;place-items:center;position:relative}
  .gauge::after{content:"";position:absolute;inset:14px;background:var(--panel);border-radius:50%}
  .gauge .inner{position:relative;z-index:1;text-align:center}
  .gauge .score{font-size:46px;font-weight:800;line-height:1}
  .gauge .of{font-size:13px;color:var(--muted)}
  .levelbadge{font-size:13px;font-weight:800;letter-spacing:1px;padding:5px 14px;border-radius:8px;text-transform:uppercase}
  .verdictcard h2{margin:0 0 4px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .verdictcard .vtitle{font-size:20px;font-weight:700;margin-bottom:10px}
  ul.reasons{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  ul.reasons li{display:flex;align-items:center;gap:10px;font-size:14px;color:#d6deea}
  ul.reasons li::before{content:"▸";color:var(--crit);font-weight:800}
  .armed{margin-top:12px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);padding-top:10px}
  .armed b{color:var(--text)}

  /* zones */
  .zone{margin:22px 0 0}
  .zonehead{display:flex;align-items:center;gap:13px;margin:0 0 14px;padding:12px 16px;border-radius:12px;border:1px solid var(--border)}
  .zonehead .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-weight:800;font-size:15px}
  .zonehead h2{font-size:16px;margin:0}
  .zonehead .desc{color:var(--muted);font-size:12px;margin-top:1px}
  .zonehead.okta{border-left:4px solid var(--okta);background:linear-gradient(90deg,rgba(0,194,255,.10),transparent)}
  .zonehead.okta .ic{background:rgba(0,194,255,.16);color:var(--okta)}
  .zonehead.github{border-left:4px solid var(--github);background:linear-gradient(90deg,rgba(177,134,255,.10),transparent)}
  .zonehead.github .ic{background:rgba(177,134,255,.16);color:var(--github)}
  .zonehead.cross{border-left:4px solid var(--warn);background:linear-gradient(90deg,rgba(245,197,66,.08),transparent)}
  .zonehead.cross .ic{background:rgba(245,197,66,.16);color:var(--warn)}

  .strip{display:grid;gap:12px;margin-bottom:14px}
  .strip.c5{grid-template-columns:repeat(5,1fr)}
  @media(max-width:880px){.strip.c5{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
  .kpi .n{font-size:23px;font-weight:800;line-height:1}
  .kpi .l{font-size:11px;color:var(--muted);margin-top:5px}
  .kpi .n.bad{color:var(--crit)}.kpi .n.warnc{color:var(--warn)}.kpi .n.okc{color:var(--ok)}.kpi .n.info{color:var(--info)}.kpi .n.gh{color:var(--github)}

  .row3{display:grid;grid-template-columns:1fr 1.2fr 1.2fr;gap:16px;margin-bottom:14px}
  @media(max-width:980px){.row3{grid-template-columns:1fr}}
  .row4{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:14px}
  @media(max-width:640px){.row4{grid-template-columns:1fr}}
  /* prevent grid/flex children from overflowing because of canvas intrinsic width */
  .card,.kpi,.tech{min-width:0}
  .row2>*,.row3>*,.row4>*,.strip>*{min-width:0}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
  @media(max-width:980px){.row2{grid-template-columns:1fr}}
  .card h3{margin:0 0 14px;font-size:13.5px;display:flex;align-items:center;gap:8px}
  .chartbox{position:relative;height:210px}
  .chartbox.sm{height:190px}

  .finding{border:1px solid #3a1b22;border-left:3px solid var(--crit);background:linear-gradient(90deg,rgba(255,77,94,.07),transparent);border-radius:10px;padding:13px 14px;margin-bottom:10px}
  .finding .ftop{display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap}
  .finding .who{font-weight:700;font-size:14px}
  .pill{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .pill.crit{background:rgba(255,77,94,.16);color:var(--crit)}
  .pill.warn{background:rgba(245,197,66,.16);color:var(--warn)}
  .pill.admin{background:rgba(255,77,94,.16);color:var(--crit)}
  .pill.write{background:rgba(255,159,67,.16);color:var(--high)}
  .pill.geo{background:rgba(57,175,234,.16);color:var(--info)}
  .finding .det{font-size:12.5px;color:#c4cdd9;line-height:1.5}
  .finding .det b{color:#fff}
  .empty{color:var(--muted);font-size:13px;padding:8px 0}

  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  table.tbl th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:0 6px 8px}
  table.tbl td{padding:9px 6px;border-top:1px solid var(--border)}
  table.tbl .mono{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted)}
  table.tbl .hit{text-align:right;font-weight:700;color:var(--ok)}
  table.tbl .hit.zero{color:var(--muted)}

  .mitre{display:flex;gap:10px;flex-wrap:wrap}
  .tech{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;min-width:150px}
  .tech .id{font-family:ui-monospace,monospace;font-weight:800;color:var(--crit);font-size:13px}
  .tech .nm{font-size:12.5px;margin-top:2px}
  .tech .tc{font-size:11px;color:var(--muted);margin-top:3px}

  .behav{max-height:300px;overflow:auto}
  .behav .r{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border);font-size:12.5px}
  .behav .r:first-child{border-top:none}
  .behav .tt{color:var(--muted);font-variant-numeric:tabular-nums;min-width:128px;font-size:11.5px}
  .behav .em{flex:1}
  .fl{font-size:15px;line-height:1}
  footer{margin-top:24px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .loading{padding:80px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">Querying Sola MCP…</div></div>

<script>
let charts = {};
const COLORS = {CRITICAL:'#ff4d5e',HIGH:'#ff9f43',MEDIUM:'#f5c542',LOW:'#2ec27e'};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const tfull = s => s? String(s).slice(0,19) : '—';

const ISO={'spain':'ES','españa':'ES','switzerland':'CH','united states':'US','united states of america':'US','usa':'US',
  'germany':'DE','france':'FR','united kingdom':'GB','uk':'GB','russia':'RU','russian federation':'RU','netherlands':'NL',
  'ireland':'IE','sweden':'SE','italy':'IT','portugal':'PT','canada':'CA','brazil':'BR','india':'IN','china':'CN',
  'japan':'JP','poland':'PL','ukraine':'UA','romania':'RO','finland':'FI','norway':'NO','denmark':'DK','belgium':'BE',
  'austria':'AT','czechia':'CZ','czech republic':'CZ','singapore':'SG','australia':'AU','mexico':'MX','argentina':'AR',
  'turkey':'TR','türkiye':'TR','south korea':'KR','hong kong':'HK','israel':'IL','south africa':'ZA','new zealand':'NZ'};
function flag(name){
  if(!name) return '🌐';
  const iso = ISO[String(name).toLowerCase().trim()];
  if(!iso) return '🌐';
  return String.fromCodePoint(...[...iso].map(ch=>0x1F1E6 + ch.charCodeAt(0) - 65));
}
const HOME='Spain';
const FOREIGN = c => c && String(c).toLowerCase().trim()!=='spain' && String(c).toLowerCase().trim()!=='españa';

function render(d){
  if(d.error){document.getElementById('app').innerHTML='<div class="loading">MCP error: '+esc(d.error)+'</div>';return;}
  const k=d.kpis, v=d.verdict, lvl=v.level, col=COLORS[lvl]||'#888';
  const deg=Math.round((k.risk_score/100)*360);
  const kpi=(n,l,cls='')=>`<div class="kpi"><div class="n ${cls}">${n}</div><div class="l">${l}</div></div>`;

  const flaggedLogins=(d.behavioral||[]).filter(b=>b.new_country||b.impossible_travel||b.new_ip);
  const admins=(d.elevated_collabs||[]).filter(c=>c.permission==='ADMIN').length;
  const privateRepos=Math.max((k.repos||0)-(k.public_repos||0),0);

  // ---- Okta findings ----
  const fatigue = (d.mfa_fatigue||[]).map(f=>`
    <div class="finding">
      <div class="ftop">
        <span class="who">${esc(f.user_email)}</span>
        <span class="pill crit">MFA fatigue</span>
        ${FOREIGN(f.country)?`<span class="pill geo">new country</span>`:''}
      </div>
      <div class="det"><b>${f.failures}</b> failed MFA pushes then a SUCCESS within 10 min · from
        <span class="fl">${flag(f.country)}</span> <b>${esc(f.city||'?')}, ${esc(f.country||'?')}</b> (<span class="mono">${esc(f.ip)}</span>)<br>
        first fail ${tfull(f.first_fail)} · success ${tfull(f.success_after)}</div>
    </div>`).join('') || '<div class="empty">No MFA-fatigue pattern in current data.</div>';

  const behav = flaggedLogins.slice(0,12).map(b=>`
    <div class="r"><span class="tt">${tfull(b.t)}</span>
      <span class="em"><span class="fl">${flag(b.country)}</span> ${esc(b.user_email)} · ${esc(b.country||'?')} <span class="mono">${esc(b.ip)}</span></span>
      ${b.impossible_travel?'<span class="pill crit">velocity</span>':''}
      ${b.new_country?'<span class="pill geo">new country</span>':''}
      ${b.new_ip&&!b.new_country?'<span class="pill warn">new IP</span>':''}
    </div>`).join('') || '<div class="empty">No flagged logins.</div>';

  // ---- GitHub ----
  const pubRepos = (d.public_repos||[]).map(r=>`
    <div class="finding"><div class="ftop"><span class="who">${esc(r.repo)}</span><span class="pill crit">PUBLIC</span></div>
      <div class="det">Repository is publicly visible — source-code exposure risk.</div></div>`).join('');
  const collabRows = (d.elevated_collabs||[]).map(c=>`
    <tr><td><b>${esc(c.collaborator)}</b></td>
        <td><span class="pill ${c.permission==='ADMIN'?'admin':'write'}">${esc(c.permission)}</span></td>
        <td class="mono">${esc(c.repo)}</td>
        <td>${esc(c.visibility||'?')}</td></tr>`).join('');
  const githubRisk = (pubRepos||'') + (collabRows?`
    <table class="tbl"><tr><th>User</th><th>Access</th><th>Repo</th><th>Visibility</th></tr>${collabRows}</table>`:
    (pubRepos?'':'<div class="empty">No public repos or elevated access.</div>'));

  // ---- cross ----
  const cov=(d.detection_coverage||[]).map(c=>`
    <tr><td>${esc(c.name)}</td><td class="hit ${c.hits===0?'zero':''}">${c.hits}</td></tr>`).join('');
  const mitre=(d.mitre||[]).map(m=>`
    <div class="tech"><div class="id">${esc(m.id)}</div><div class="nm">${esc(m.name)}</div><div class="tc">${esc(m.tactic)}</div></div>`).join('')
    || '<div class="empty">No techniques mapped.</div>';

  document.getElementById('app').innerHTML=`
   <header class="top">
     <div class="brand"><span class="dot"></span>
       <div><h1>${esc(d.app.name)}</h1>
         <div class="sub">SOC dashboard · identity → code correlation · live from Sola MCP</div></div>
     </div>
     <div class="topright">
       <button class="refresh" onclick="load()">↻ Refresh</button>
     </div>
   </header>

   <div class="hero">
     <div class="card gaugecard">
       <div class="gauge" style="background:conic-gradient(${col} ${deg}deg, #1c2430 0deg)">
         <div class="inner"><div class="score" style="color:${col}">${k.risk_score}</div><div class="of">/ 100 risk</div></div>
       </div>
       <span class="levelbadge" style="background:${col}22;color:${col}">${esc(lvl)}</span>
     </div>
     <div class="card verdictcard">
       <h2>Investigation verdict</h2>
       <div class="vtitle">${lvl==='CRITICAL'||lvl==='HIGH'?'Likely account takeover in progress':'Activity reviewed'}</div>
       <ul class="reasons">${v.reasons.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
       <div class="armed"><b>${k.queries_armed}</b> queries · <b>${k.alerts_armed}</b> alerts · <b>${k.data_sources}</b> data sources armed in Sola</div>
     </div>
   </div>

   <!-- ===================== OKTA ZONE ===================== -->
   <div class="zone">
     <div class="zonehead okta"><div class="ic">OK</div>
       <div><h2>Identity · Okta</h2><div class="desc">Authentication, MFA & login behavior</div></div>
     </div>
     <div class="strip c5">
       ${kpi(k.okta_events,'Okta events','info')}
       ${kpi(k.auth_success,'Auth success','okc')}
       ${kpi(k.auth_failure,'Auth failures','bad')}
       ${kpi(k.mfa_fatigue_users,'MFA-fatigue users', k.mfa_fatigue_users?'bad':'')}
       ${kpi(flaggedLogins.length,'Flagged logins', flaggedLogins.length?'warnc':'')}
     </div>
     <div class="row4">
       <div class="card"><h3>Auth outcomes</h3><div class="chartbox sm"><canvas id="cOutcome"></canvas></div></div>
       <div class="card"><h3>Events by country</h3><div class="chartbox sm"><canvas id="cCountry"></canvas></div></div>
       <div class="card"><h3>Top event types</h3><div class="chartbox sm"><canvas id="cEvents"></canvas></div></div>
       <div class="card"><h3>Activity by source IP / geo</h3><div class="chartbox sm"><canvas id="cIps"></canvas></div></div>
     </div>
     <div class="row2">
       <div class="card"><h3>MFA fatigue / takeover signals</h3>${fatigue}</div>
       <div class="card"><h3>Flagged logins · new country / impossible travel</h3><div class="behav">${behav}</div></div>
     </div>
   </div>

   <!-- ===================== GITHUB ZONE ===================== -->
   <div class="zone">
     <div class="zonehead github"><div class="ic">GH</div>
       <div><h2>Code · GitHub</h2><div class="desc">Repositories & collaborator access</div></div>
     </div>
     <div class="strip c5">
       ${kpi(k.repos,'Repositories','gh')}
       ${kpi(k.public_repos,'Public repos', k.public_repos?'bad':'okc')}
       ${kpi(privateRepos,'Private repos')}
       ${kpi(k.elevated_collabs,'WRITE/ADMIN collabs', k.elevated_collabs?'warnc':'')}
       ${kpi(admins,'Admin collabs', admins?'bad':'')}
     </div>
     <div class="row3">
       <div class="card"><h3>Collaborators by access</h3><div class="chartbox sm"><canvas id="cPerm"></canvas></div></div>
       <div class="card"><h3>Repositories by visibility</h3><div class="chartbox sm"><canvas id="cVis"></canvas></div></div>
       <div class="card"><h3>Repository &amp; access risk</h3>${githubRisk}</div>
     </div>
   </div>

   <!-- ===================== CORRELATION ZONE ===================== -->
   <div class="zone">
     <div class="zonehead cross"><div class="ic">⚇</div>
       <div><h2>Correlation &amp; coverage</h2><div class="desc">Cross-source detections and ATT&CK mapping</div></div>
     </div>
     <div class="row2">
       <div class="card"><h3>Detection coverage <span style="color:var(--muted);font-weight:400">· live hits</span></h3>
         <table class="tbl"><tr><th>Detection</th><th style="text-align:right">Hits</th></tr>${cov}</table></div>
       <div class="card"><h3>MITRE ATT&CK techniques observed</h3><div class="mitre">${mitre}</div></div>
     </div>
   </div>

   <footer>
     <span>${esc(d.app.name)} · Okta + GitHub + AbuseIPDB · all values queried live from the Sola MCP</span>
     <span>Updated ${new Date().toLocaleTimeString()}</span>
   </footer>`;

  drawCharts(d);
}

function drawCharts(d){
  Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy()); charts={};
  Chart.defaults.color='#8492a6'; Chart.defaults.font.family='ui-sans-serif,system-ui';
  Chart.defaults.borderColor='#222b39';

  const ao=d.charts.auth_outcomes||{};
  charts.o=new Chart(document.getElementById('cOutcome'),{type:'doughnut',
    data:{labels:['Success','Failure','Other'],datasets:[{data:[ao.success||0,ao.failure||0,ao.other||0],
      backgroundColor:['#2ec27e','#ff4d5e','#3a4658'],borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14}}},cutout:'62%',maintainAspectRatio:false}});

  const ev=d.charts.event_types||[];
  charts.e=new Chart(document.getElementById('cEvents'),{type:'bar',
    data:{labels:ev.map(e=>e.type.replace(/^user\.|^policy\.|^application\./,'')),
      datasets:[{data:ev.map(e=>e.n),backgroundColor:'#00c2ff',borderRadius:4}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},maintainAspectRatio:false,
      scales:{x:{grid:{color:'#1a2230'}},y:{grid:{display:false},ticks:{font:{size:10}}}}}});

  const ips=d.charts.top_ips||[];
  charts.i=new Chart(document.getElementById('cIps'),{type:'bar',
    data:{labels:ips.map(i=>flag(i.country)+' '+i.ip),
      datasets:[{data:ips.map(i=>i.n),
        backgroundColor:ips.map(i=>FOREIGN(i.country)?'#ff4d5e':'#39afea'),borderRadius:4}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:c=>{const i=ips[c.dataIndex];return (i.city||'?')+', '+(i.country||'?');}}}},
      maintainAspectRatio:false,scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#1a2230'}}}}});

  const bc=d.charts.by_country||[];
  charts.c=new Chart(document.getElementById('cCountry'),{type:'bar',
    data:{labels:bc.map(x=>flag(x.country)+' '+x.country),
      datasets:[{data:bc.map(x=>x.n),
        backgroundColor:bc.map(x=>FOREIGN(x.country)?'#ff4d5e':'#39afea'),borderRadius:4}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},maintainAspectRatio:false,
      scales:{x:{grid:{color:'#1a2230'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});

  const perm=d.charts.collab_by_perm||[];
  const permColor=p=>({ADMIN:'#ff4d5e',MAINTAIN:'#ff9f43',WRITE:'#f5c542',TRIAGE:'#39afea',READ:'#3a4658'}[p]||'#6b7787');
  charts.p=new Chart(document.getElementById('cPerm'),{type:'doughnut',
    data:{labels:perm.map(p=>p.permission),datasets:[{data:perm.map(p=>p.n),
      backgroundColor:perm.map(p=>permColor(p.permission)),borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:12,font:{size:11}}}},cutout:'58%',maintainAspectRatio:false}});

  const vis=d.charts.repo_visibility||[];
  const visColor=v=>v==='PUBLIC'?'#ff4d5e':'#b186ff';
  charts.v=new Chart(document.getElementById('cVis'),{type:'doughnut',
    data:{labels:vis.map(x=>x.visibility),datasets:[{data:vis.map(x=>x.n),
      backgroundColor:vis.map(x=>visColor(x.visibility)),borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:12,font:{size:11}}}},cutout:'58%',maintainAspectRatio:false}});
}

function load(){
  const btn=document.querySelector('button.refresh');
  if(btn){btn.textContent='↻ Refreshing…';btn.disabled=true;}
  fetch('./api/incident',{cache:'no-store'}).then(r=>r.json()).then(render)
    .catch(e=>{document.getElementById('app').innerHTML='<div class="loading">Could not reach the server. Run: python3 server.py</div>';console.error(e);});
}
load();
</script>
</body>
</html>
